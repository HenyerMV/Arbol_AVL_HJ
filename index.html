<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVL Tree Visualizer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap');

:root { --transition: 0.3s ease; }

[data-theme="dark"] {
  --bg-primary:    #0a0a0f;
  --bg-secondary:  #111118;
  --bg-surface:    #16161f;
  --bg-card:       #1a1a26;
  --accent:        #7c3aed;
  --accent-bright: #a855f7;
  --accent-glow:   rgba(124,58,237,0.35);
  --accent-dim:    #4c1d95;
  --node-fill:     #6d28d9;
  --node-stroke:   #a855f7;
  --node-text:     #f5f3ff;
  --edge-color:    #7c3aed;
  --text-primary:  #e9e5ff;
  --text-secondary:#a89bc2;
  --text-muted:    #5c5475;
  --border:        #2d2445;
  --border-bright: #5b21b6;
  --btn-bg:        #1e1b2e;
  --btn-hover:     #2d2850;
  --btn-active:    #4c1d95;
  --input-bg:      #12111a;
  --canvas-bg:     #0d0d14;
  --highlight:     #f0abfc;
  --success:       #34d399;
  --warning:       #fbbf24;
  --danger:        #f87171;
  --shadow:        0 4px 24px rgba(124,58,237,0.2);
  --node-visiting: #a855f7;
  --node-inserted: #34d399;
  --node-rotate:   #fbbf24;
}

[data-theme="light"] {
  --bg-primary:    #f8f9ff;
  --bg-secondary:  #f0f0fb;
  --bg-surface:    #e8e8f8;
  --bg-card:       #ffffff;
  --accent:        #1d4ed8;
  --accent-bright: #2563eb;
  --accent-glow:   rgba(29,78,216,0.2);
  --accent-dim:    #bfdbfe;
  --node-fill:     #2563eb;
  --node-stroke:   #1d4ed8;
  --node-text:     #ffffff;
  --edge-color:    #3b82f6;
  --text-primary:  #0f172a;
  --text-secondary:#334155;
  --text-muted:    #94a3b8;
  --border:        #cbd5e1;
  --border-bright: #3b82f6;
  --btn-bg:        #f1f5f9;
  --btn-hover:     #dbeafe;
  --btn-active:    #bfdbfe;
  --input-bg:      #ffffff;
  --canvas-bg:     #f0f4ff;
  --highlight:     #7c3aed;
  --success:       #059669;
  --warning:       #d97706;
  --danger:        #dc2626;
  --shadow:        0 4px 24px rgba(29,78,216,0.15);
  --node-visiting: #1d4ed8;
  --node-inserted: #059669;
  --node-rotate:   #d97706;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 56px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}

.header-title { display: flex; align-items: center; gap: 12px; }

.logo-icon {
  width: 32px; height: 32px;
  border: 2px solid var(--accent-bright);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Space Mono', monospace;
  font-size: 13px; font-weight: 700;
  color: var(--accent-bright);
  box-shadow: 0 0 10px var(--accent-glow);
  animation: pulse-accent 3s ease-in-out infinite;
}

h1 { font-size: 20px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
h1 span { color: var(--accent-bright); }

.header-right { display: flex; align-items: center; gap: 12px; }

.theme-toggle {
  position: relative; width: 52px; height: 26px;
  background: var(--btn-bg); border: 1px solid var(--border);
  border-radius: 13px; cursor: pointer;
}
.theme-toggle::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--accent-bright);
  transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 6px var(--accent-glow);
}
[data-theme="light"] .theme-toggle::after { transform: translateX(26px); }
.theme-label { font-size: 11px; font-weight: 600; letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase; }

.main-layout { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 56px); }

.left-panel {
  width: 260px; flex-shrink: 0;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto; padding: 16px; gap: 16px;
}

.panel-section {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px;
}

.section-title {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text-muted);
  margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
}
.section-title::before {
  content: ''; display: inline-block; width: 3px; height: 12px;
  background: var(--accent-bright); border-radius: 2px;
}

.input-row { display: flex; gap: 8px; margin-bottom: 10px; }

.num-input {
  flex: 1; background: var(--input-bg); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-primary);
  font-family: 'Space Mono', monospace; font-size: 14px;
  padding: 8px 10px; outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.num-input:focus { border-color: var(--accent-bright); box-shadow: 0 0 0 2px var(--accent-glow); }
.num-input::placeholder { color: var(--text-muted); }

.btn {
  padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--btn-bg); color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600;
  letter-spacing: 0.5px; cursor: pointer;
  transition: background var(--transition), border-color var(--transition),
              box-shadow var(--transition), transform 0.1s;
  white-space: nowrap;
}
.btn:hover { background: var(--btn-hover); border-color: var(--accent-bright); }
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--accent); border-color: var(--accent-bright);
  color: #fff; box-shadow: 0 0 12px var(--accent-glow);
}
.btn-primary:hover { background: var(--accent-bright); box-shadow: 0 0 18px var(--accent-glow); }
.btn-danger { border-color: var(--danger); color: var(--danger); }
.btn-danger:hover { background: rgba(248,113,113,0.1); }
.btn-full { width: 100%; justify-content: center; display: flex; }
.btn-row { display: flex; gap: 6px; flex-wrap: wrap; }

.speed-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
.speed-label { font-size: 11px; color: var(--text-muted); font-weight: 600; letter-spacing: 1px; min-width: 36px; }

input[type="range"] {
  flex: 1; -webkit-appearance: none; height: 4px;
  background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
  background: var(--accent-bright); box-shadow: 0 0 6px var(--accent-glow);
  cursor: pointer; transition: transform 0.15s;
}
input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

.playback-controls {
  display: flex; gap: 8px; align-items: center; justify-content: center;
}

.ctrl-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--btn-bg);
  color: var(--text-primary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background var(--transition), border-color var(--transition),
              box-shadow var(--transition), transform 0.1s;
  font-size: 13px;
}
.ctrl-btn:hover { background: var(--btn-hover); border-color: var(--accent-bright); box-shadow: 0 0 10px var(--accent-glow); }
.ctrl-btn:active { transform: scale(0.93); }
.ctrl-btn.play-btn {
  width: 42px; height: 42px; background: var(--accent);
  border-color: var(--accent-bright); box-shadow: 0 0 14px var(--accent-glow);
}
.ctrl-btn.play-btn:hover { background: var(--accent-bright); }
.ctrl-btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

.step-log {
  font-family: 'Space Mono', monospace; font-size: 11px; line-height: 1.7;
  color: var(--text-secondary); max-height: 180px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.step-log::-webkit-scrollbar { width: 4px; }
.step-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.log-entry {
  padding: 2px 4px; border-radius: 3px;
  animation: fadeIn 0.3s ease;
}
.log-entry.active { background: var(--btn-hover); color: var(--accent-bright); }
.log-entry.rotate { color: var(--node-rotate); }
.log-entry.insert { color: var(--node-inserted); }
.log-entry.search { color: var(--node-visiting); }
.log-entry.balance { color: var(--highlight); }

@keyframes fadeIn { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; } }

.canvas-area {
  flex: 1; display: flex; flex-direction: column;
  background: var(--bg-primary); position: relative; overflow: hidden;
}

#avl-canvas {
  flex: 1; display: block; background: var(--canvas-bg);
  cursor: crosshair; transition: background var(--transition);
}

.status-bar {
  height: 32px; background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 20px; flex-shrink: 0;
}

.status-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: var(--text-muted);
}
.status-item .val { font-family: 'Space Mono', monospace; color: var(--text-secondary); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 4px var(--success); }
.status-dot.busy { background: var(--warning); box-shadow: 0 0 4px var(--warning); }

.balance-badge {
  display: inline-flex; align-items: center; padding: 2px 6px;
  border-radius: 4px; font-size: 10px; font-family: 'Space Mono', monospace;
  font-weight: 700; border: 1px solid;
}
.balance-badge.ok   { background: rgba(52,211,153,0.1); color: var(--success); border-color: var(--success); }
.balance-badge.error { background: rgba(248,113,113,0.1); color: var(--danger); border-color: var(--danger); }

.right-panel {
  width: 200px; flex-shrink: 0;
  background: var(--bg-secondary); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 16px; gap: 14px; overflow-y: auto;
}

.stat-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px; text-align: center;
}
.stat-value {
  font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700;
  color: var(--accent-bright); line-height: 1; margin-bottom: 4px;
}
.stat-label {
  font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text-muted);
}

.legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-secondary); padding: 3px 0; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

#tooltip {
  position: fixed; background: var(--bg-card);
  border: 1px solid var(--border-bright); border-radius: 6px;
  padding: 6px 10px; font-size: 12px; font-family: 'Space Mono', monospace;
  color: var(--text-primary); pointer-events: none; opacity: 0;
  transition: opacity 0.15s; z-index: 100; box-shadow: var(--shadow); white-space: nowrap;
}
#tooltip.visible { opacity: 1; }

@keyframes pulse-accent {
  0%, 100% { box-shadow: 0 0 10px var(--accent-glow); }
  50%       { box-shadow: 0 0 22px var(--accent-glow), 0 0 40px var(--accent-glow); }
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

@media (max-width: 900px) { .right-panel { display: none; } }
@media (max-width: 640px) { .left-panel { width: 200px; } }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <div class="logo-icon">AVL</div>
    <h1><span>AVL</span> TREE</h1>
  </div>
  <div class="header-right">
    <span class="theme-label" id="theme-label">DARK</span>
    <div class="theme-toggle" id="theme-toggle" title="Cambiar tema"></div>
  </div>
</header>

<div class="main-layout">

  <aside class="left-panel">

    <div class="panel-section">
      <div class="section-title">Insertar</div>
      <div class="input-row">
        <input class="num-input" type="number" id="insert-val" placeholder="ej: 42" min="-999" max="999">
        <button class="btn btn-primary" id="btn-insert">+ INS</button>
      </div>
      <div class="btn-row">
        <button class="btn" id="btn-insert-random" style="flex:1">Aleatorio</button>
        <button class="btn" id="btn-insert-seq" style="flex:1">Secuencia</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="section-title">Buscar / Eliminar</div>
      <div class="input-row">
        <input class="num-input" type="number" id="search-val" placeholder="valor" min="-999" max="999">
      </div>
      <div class="btn-row">
        <button class="btn" id="btn-search" style="flex:1">🔍 Buscar</button>
        <button class="btn btn-danger" id="btn-delete" style="flex:1">✕ Eliminar</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="section-title">Reproducción</div>
      <div class="playback-controls" style="margin-bottom:12px">
        <button class="ctrl-btn" id="btn-undo" title="Deshacer paso">↩</button>
        <button class="ctrl-btn" id="btn-step-back" title="Paso anterior">⏮</button>
        <button class="ctrl-btn play-btn" id="btn-play" title="Play / Pause">▶</button>
        <button class="ctrl-btn" id="btn-step-fwd" title="Paso siguiente">⏭</button>
        <button class="ctrl-btn" id="btn-stop" title="Reiniciar animación">⏹</button>
      </div>
      <div class="speed-row">
        <span class="speed-label">VEL</span>
        <input type="range" id="speed-slider" min="1" max="10" value="5">
        <span class="speed-label" id="speed-val">5</span>
      </div>
    </div>

    <div class="panel-section">
      <div class="section-title">Árbol</div>
      <div class="btn-row" style="flex-direction:column;gap:6px">
        <button class="btn btn-full" id="btn-clear">🗑 Limpiar árbol</button>
        <button class="btn btn-full" id="btn-balance-check">⚖ Verificar balance</button>
        <button class="btn btn-full" id="btn-recenter">⊙ Centrar vista</button>
      </div>
    </div>

    <div class="panel-section" style="flex:1;min-height:100px">
      <div class="section-title">Log de pasos</div>
      <div class="step-log" id="step-log">
        <div class="log-entry">Sistema listo. Inserta un valor para comenzar.</div>
      </div>
    </div>

  </aside>

  <main class="canvas-area">
    <canvas id="avl-canvas"></canvas>
    <div class="status-bar">
      <div class="status-item"><div class="status-dot" id="status-dot"></div><span id="status-text">Listo</span></div>
      <div class="status-item">NODOS: <span class="val" id="stat-nodes">0</span></div>
      <div class="status-item">ALTURA: <span class="val" id="stat-height">—</span></div>
      <div class="status-item">PASO: <span class="val" id="stat-step">0/0</span></div>
      <div class="status-item" id="balance-status"></div>
    </div>
  </main>

  <aside class="right-panel">
    <div class="section-title">Estadísticas</div>
    <div class="stat-card"><div class="stat-value" id="rp-nodes">0</div><div class="stat-label">Nodos</div></div>
    <div class="stat-card"><div class="stat-value" id="rp-height">0</div><div class="stat-label">Altura</div></div>

    <div class="section-title" style="margin-top:8px">Leyenda</div>
    <div style="display:flex;flex-direction:column;gap:2px">
      <div class="legend-item"><div class="legend-dot" style="background:var(--node-fill)"></div>Normal</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--node-visiting)"></div>Visitando</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--node-inserted)"></div>Insertado</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--node-rotate)"></div>Rotando</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--danger)"></div>Desbalanceado</div>
    </div>

    <div class="section-title" style="margin-top:8px">Recorridos</div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <button class="btn btn-full" id="btn-inorder">InOrden</button>
      <button class="btn btn-full" id="btn-preorder">PreOrden</button>
      <button class="btn btn-full" id="btn-postorder">PostOrden</button>
    </div>
  </aside>

</div>

<div id="tooltip"></div>

<script>
'use strict';

/* ── THEME MANAGER ── */
const ThemeManager = (() => {
  const toggle = document.getElementById('theme-toggle');
  const label  = document.getElementById('theme-label');
  const html   = document.documentElement;
  function set(theme) {
    html.setAttribute('data-theme', theme);
    label.textContent = theme === 'dark' ? 'DARK' : 'LIGHT';
    localStorage.setItem('avl-theme', theme);
    if (window.AVLCanvas) window.AVLCanvas.redraw();
  }
  function init() {
    const saved = localStorage.getItem('avl-theme') || 'dark';
    set(saved);
    toggle.addEventListener('click', () => set(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));
  }
  function getVar(name) { return getComputedStyle(html).getPropertyValue(name).trim(); }
  return { init, getVar };
})();

/* ── LOGGER ── */
const Logger = (() => {
  const log = document.getElementById('step-log');
  let entries = [];
  function add(msg, type = '') {
    entries.push({ msg, type });
    const div = document.createElement('div');
    div.className = 'log-entry ' + type;
    div.textContent = `[${entries.length.toString().padStart(3,'0')}] ${msg}`;
    log.appendChild(div);
    log.querySelectorAll('.log-entry.active').forEach(e => e.classList.remove('active'));
    div.classList.add('active');
    log.scrollTop = log.scrollHeight;
  }
  function clear() { entries = []; log.innerHTML = '<div class="log-entry">Sistema listo.</div>'; }
  return { add, clear };
})();

/* ── STATS ── */
const Stats = (() => {
  let nodes = 0, height = 0;
  function update(n, h) {
    if (n !== undefined) nodes = n;
    if (h !== undefined) height = h;
    render();
  }
  function render() {
    document.getElementById('stat-nodes').textContent = nodes;
    document.getElementById('stat-height').textContent = height || '—';
    document.getElementById('rp-nodes').textContent = nodes;
    document.getElementById('rp-height').textContent = height || 0;
  }
  function reset() { nodes = 0; height = 0; render(); }
  function stepLabel(current, total) {
    document.getElementById('stat-step').textContent = `${current}/${total}`;
  }
  return { update, reset, stepLabel };
})();

/* ── STATUS BAR ── */
const Status = (() => {
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  const bal  = document.getElementById('balance-status');
  function set(msg, busy = false) {
    text.textContent = msg;
    dot.className = 'status-dot' + (busy ? ' busy' : '');
  }
  function setBalance(balanced) {
    if (balanced === null) { bal.innerHTML = ''; return; }
    const cls = balanced ? 'ok' : 'error';
    const lbl = balanced ? 'BALANCEADO' : 'DESBALANCEADO';
    bal.innerHTML = `<span class="balance-badge ${cls}">${lbl}</span>`;
  }
  return { set, setBalance };
})();

/* ── AVL TREE ── */
const AVLTree = (() => {
  let root = null;
  function h(n) { return n ? n.height : 0; }
  function updateHeight(n) { if (n) n.height = 1 + Math.max(h(n.left), h(n.right)); }
  function bf(n) { return n ? h(n.left) - h(n.right) : 0; }

  function rotateRight(y) {
    const x = y.left, T2 = x.right;
    x.right = y; y.left = T2;
    updateHeight(y); updateHeight(x);
    return x;
  }
  function rotateLeft(x) {
    const y = x.right, T2 = y.left;
    y.left = x; x.right = T2;
    updateHeight(x); updateHeight(y);
    return y;
  }

  function balance(node, steps) {
    updateHeight(node);
    const factor = bf(node);
    if (factor > 1 && bf(node.left) >= 0) {
      steps.push({ type:'rotate', msg:`Rotación SIMPLE DERECHA en nodo ${node.val} (BF=${factor})`, node: node.val });
      return rotateRight(node);
    }
    if (factor > 1 && bf(node.left) < 0) {
      steps.push({ type:'rotate', msg:`Rotación DOBLE LR en nodo ${node.val} (BF=${factor})`, node: node.val });
      node.left = rotateLeft(node.left);
      return rotateRight(node);
    }
    if (factor < -1 && bf(node.right) <= 0) {
      steps.push({ type:'rotate', msg:`Rotación SIMPLE IZQUIERDA en nodo ${node.val} (BF=${factor})`, node: node.val });
      return rotateLeft(node);
    }
    if (factor < -1 && bf(node.right) > 0) {
      steps.push({ type:'rotate', msg:`Rotación DOBLE RL en nodo ${node.val} (BF=${factor})`, node: node.val });
      node.right = rotateRight(node.right);
      return rotateLeft(node);
    }
    return node;
  }

  function insertNode(node, val, steps) {
    if (!node) {
      steps.push({ type:'insert', msg:`Insertando ${val}`, node: val });
      return { val, left: null, right: null, height: 1 };
    }
    steps.push({ type:'visit', msg:`Visitando ${node.val} → ir a ${val < node.val ? 'izquierda' : 'derecha'}`, node: node.val });
    if      (val < node.val) node.left  = insertNode(node.left,  val, steps);
    else if (val > node.val) node.right = insertNode(node.right, val, steps);
    else {
      steps.push({ type:'info', msg:`Valor ${val} ya existe.`, node: val });
      return node;
    }
    steps.push({ type:'balance', msg:`Verificando BF en ${node.val}: ${bf(node)} → ${Math.abs(bf(node)) <= 1 ? 'OK' : '¡DESBALANCEADO!'}`, node: node.val });
    return balance(node, steps);
  }

  function insert(val) {
    const steps = [];
    steps.push({ type:'insert', msg:`Iniciando inserción de ${val}`, node: null });
    root = insertNode(root, val, steps);
    return steps;
  }

  function minNode(node) { let c = node; while (c.left) c = c.left; return c; }

  function deleteNode(node, val, steps) {
    if (!node) { steps.push({ type:'info', msg:`${val} no encontrado.`, node: null }); return null; }
    steps.push({ type:'visit', msg:`Buscando ${val} en nodo ${node.val}`, node: node.val });
    if (val < node.val) { node.left  = deleteNode(node.left,  val, steps); }
    else if (val > node.val) { node.right = deleteNode(node.right, val, steps); }
    else {
      steps.push({ type:'insert', msg:`Eliminando nodo ${node.val}`, node: node.val });
      if (!node.left || !node.right) {
        node = node.left || node.right || null;
      } else {
        const succ = minNode(node.right);
        steps.push({ type:'balance', msg:`Sucesor inorden: ${succ.val}`, node: succ.val });
        node.val   = succ.val;
        node.right = deleteNode(node.right, succ.val, steps);
      }
    }
    if (!node) return null;
    steps.push({ type:'balance', msg:`Rebalanceando desde ${node.val} BF=${bf(node)}`, node: node.val });
    return balance(node, steps);
  }

  function remove(val) {
    const steps = [];
    steps.push({ type:'insert', msg:`Iniciando eliminación de ${val}`, node: null });
    root = deleteNode(root, val, steps);
    return steps;
  }

  function searchNode(node, val, steps) {
    if (!node) { steps.push({ type:'info', msg:`${val} no encontrado.`, node: null }); return false; }
    steps.push({ type:'search', msg:`Comparando con ${node.val} → ${val === node.val ? '¡ENCONTRADO!' : val < node.val ? 'ir izquierda' : 'ir derecha'}`, node: node.val });
    if (val === node.val) return true;
    return searchNode(val < node.val ? node.left : node.right, val, steps);
  }

  function search(val) {
    const steps = [];
    steps.push({ type:'search', msg:`Buscando ${val}…`, node: null });
    const found = searchNode(root, val, steps);
    steps.push({ type: found ? 'insert' : 'info', msg: found ? `¡Valor ${val} encontrado!` : `Valor ${val} no existe.`, node: val });
    return steps;
  }

  function inorder(node = root, arr = []) { if (!node) return arr; inorder(node.left, arr); arr.push(node.val); inorder(node.right, arr); return arr; }
  function preorder(node = root, arr = []) { if (!node) return arr; arr.push(node.val); preorder(node.left, arr); preorder(node.right, arr); return arr; }
  function postorder(node = root, arr = []) { if (!node) return arr; postorder(node.left, arr); postorder(node.right, arr); arr.push(node.val); return arr; }

  function getRoot()   { return root; }
  function clear()     { root = null; }
  function treeHeight(node = root) { if (!node) return 0; return 1 + Math.max(treeHeight(node.left), treeHeight(node.right)); }
  function nodeCount(node = root)  { if (!node) return 0; return 1 + nodeCount(node.left) + nodeCount(node.right); }
  function isBalanced(node = root) { if (!node) return true; return Math.abs(bf(node)) <= 1 && isBalanced(node.left) && isBalanced(node.right); }
  function getBF(val) {
    function find(n, v) { if (!n) return null; if (n.val === v) return bf(n); return find(v < n.val ? n.left : n.right, v); }
    return find(root, val);
  }

  return { insert, remove, search, getRoot, clear, treeHeight, nodeCount, isBalanced, getBF, inorder, preorder, postorder };
})();

/* ─────────────────────────────────────────────────────────────────────
   ANIMATION ENGINE — versión con tweening fluido por RAF
   
   Cada "paso" de la lógica AVL dispara un tween de COLOR en el nodo.
   El canvas se redibuja cada frame mediante requestAnimationFrame,
   interpolando suavemente entre el color base y el color de estado.
   
   nodeStates: Map< nodeVal → { r,g,b, targetR,targetG,targetB, alpha, targetAlpha } >
   nodeScales: Map< nodeVal → { scale, targetScale } >
   edgeProgress: Map< `${pVal}-${cVal}` → { progress, target } >  (para dibujar aristas creciendo)
────────────────────────────────────────────────────────────────────── */
const AnimEngine = (() => {
  let queue    = [];
  let history  = [];
  let current  = 0;
  let playing  = false;
  let timer    = null;
  let speed    = 5;

  /* ── Tweening state ── */
  // nodeStates almacena color interpolado por nodo
  // Estructura: { r,g,b,a, tr,tg,tb,ta, state }
  let nodeStates  = {};   // val → state object
  let nodeScales  = {};   // val → { s, ts } scale tween
  let edgeStates  = {};   // "parent-child" → { t, target } 0→1 draw progress
  let rafId       = null;
  let lastRaf     = 0;

  const LERP_SPEED = 8; // factor por segundo (valor más alto = más rápido)

  const SPEEDS = [1400,1000,750,520,380,260,170,100,55,20];
  function delay() { return SPEEDS[speed - 1]; }
  function setSpeed(s) { speed = s; }

  /* Convierte hex/css a {r,g,b} */
  function hexToRgb(str) {
    str = str.trim();
    if (str.startsWith('#')) {
      const big = parseInt(str.slice(1), 16);
      return { r: (big >> 16) & 255, g: (big >> 8) & 255, b: big & 255 };
    }
    // rgb(...)
    const m = str.match(/\d+/g);
    if (m) return { r: +m[0], g: +m[1], b: +m[2] };
    return { r: 109, g: 40, b: 217 };
  }

  function colorFor(state) {
    const tv = (v) => ThemeManager.getVar(v);
    switch (state) {
      case 'visiting':  return hexToRgb(tv('--node-visiting'));
      case 'inserted':  return hexToRgb(tv('--node-inserted'));
      case 'rotate':    return hexToRgb(tv('--node-rotate'));
      case 'balance':   return hexToRgb(tv('--danger'));
      case 'found':     return hexToRgb(tv('--node-inserted'));
      default:          return hexToRgb(tv('--node-fill'));
    }
  }

  function getOrCreate(val) {
    if (!nodeStates[val]) {
      const base = colorFor('normal');
      nodeStates[val] = { r: base.r, g: base.g, b: base.b, a: 1,
                          tr: base.r, tg: base.g, tb: base.b, ta: 1,
                          state: 'normal', glowT: 0, targetGlow: 0 };
    }
    if (!nodeScales[val]) {
      nodeScales[val] = { s: 1, ts: 1 };
    }
    return nodeStates[val];
  }

  /* Establece color objetivo de un nodo con "punch" de escala */
  function setNodeTarget(val, state) {
    if (val === null || val === undefined) return;
    const ns = getOrCreate(val);
    const col = colorFor(state);
    ns.tr = col.r; ns.tg = col.g; ns.tb = col.b;
    ns.state = state;
    ns.targetGlow = (state !== 'normal') ? 1 : 0;
    // punch de escala al visitarse
    if (state === 'visiting' || state === 'inserted' || state === 'rotate') {
      nodeScales[val].ts = 1.22;
      setTimeout(() => { if (nodeScales[val]) nodeScales[val].ts = 1.0; }, 200);
    }
  }

  /* Suaviza un nodo de vuelta a normal */
  function resetNodeToNormal(val) {
    if (!nodeStates[val]) return;
    const base = colorFor('normal');
    nodeStates[val].tr = base.r;
    nodeStates[val].tg = base.g;
    nodeStates[val].tb = base.b;
    nodeStates[val].state = 'normal';
    nodeStates[val].targetGlow = 0;
  }

  /* Registra una arista para animación de "crecimiento" */
  function touchEdge(parentVal, childVal) {
    const key = `${parentVal}-${childVal}`;
    if (!edgeStates[key]) {
      edgeStates[key] = { t: 0, target: 1 };
    } else {
      edgeStates[key].target = 1;
    }
  }

  function getEdgeProgress(pv, cv) {
    const key = `${pv}-${cv}`;
    return edgeStates[key] ? edgeStates[key].t : 1;
  }

  /* RAF loop: interpola todos los estados y redibuja */
  function startRAF() {
    if (rafId) return;
    lastRaf = performance.now();
    function tick(now) {
      const dt = Math.min((now - lastRaf) / 1000, 0.1); // delta en segundos, cap
      lastRaf = now;
      const lf = 1 - Math.pow(1 - Math.min(LERP_SPEED * dt, 0.99), 1);

      let needsRedraw = false;

      // Interpolar colores de nodos
      for (const val in nodeStates) {
        const ns = nodeStates[val];
        const dr = ns.tr - ns.r, dg = ns.tg - ns.g, db = ns.tb - ns.b;
        const dg2 = ns.targetGlow - ns.glowT;
        if (Math.abs(dr) > 0.5 || Math.abs(dg) > 0.5 || Math.abs(db) > 0.5 || Math.abs(dg2) > 0.01) {
          ns.r  += dr * lf;
          ns.g  += dg * lf;
          ns.b  += db * lf;
          ns.glowT += dg2 * lf;
          needsRedraw = true;
        } else {
          ns.r = ns.tr; ns.g = ns.tg; ns.b = ns.tb; ns.glowT = ns.targetGlow;
        }
      }

      // Interpolar escalas
      for (const val in nodeScales) {
        const sc = nodeScales[val];
        const ds = sc.ts - sc.s;
        if (Math.abs(ds) > 0.002) { sc.s += ds * lf; needsRedraw = true; }
        else sc.s = sc.ts;
      }

      // Interpolar aristas
      for (const key in edgeStates) {
        const es = edgeStates[key];
        const dt2 = es.target - es.t;
        if (Math.abs(dt2) > 0.005) { es.t += dt2 * (lf * 1.5); needsRedraw = true; }
        else es.t = es.target;
      }

      if (needsRedraw && window.AVLCanvas) window.AVLCanvas.redraw();

      rafId = requestAnimationFrame(tick);
    }
    rafId = requestAnimationFrame(tick);
  }

  function stopRAF() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  }

  /* Pasos pendientes de la lógica AVL */
  function load(steps) {
    stop();
    queue   = [...steps];
    history = [];
    current = 0;
    Stats.stepLabel(0, queue.length);
    // Inicializar estados de nuevos nodos
    // (los existentes mantienen color base)
    startRAF();
  }

  let prevVisited = null;

  function executeStep(step) {
    if (!step) return;
    history.push({ step, prevVisited });

    // Nodo visitado previamente vuelve a normal (con tween)
    if (prevVisited !== null && prevVisited !== step.node) {
      // Mantener 'inserted' si fue insertado
      const ns = nodeStates[prevVisited];
      if (ns && ns.state === 'visiting') resetNodeToNormal(prevVisited);
    }

    if (step.node !== null && step.node !== undefined) {
      getOrCreate(step.node);
    }

    if      (step.type === 'visit')   { setNodeTarget(step.node, 'visiting'); prevVisited = step.node; }
    else if (step.type === 'insert')  { setNodeTarget(step.node, 'inserted'); prevVisited = step.node; }
    else if (step.type === 'rotate')  { setNodeTarget(step.node, 'rotate');   prevVisited = step.node; }
    else if (step.type === 'balance') { setNodeTarget(step.node, 'balance');  prevVisited = step.node; }
    else if (step.type === 'search')  { setNodeTarget(step.node, 'visiting'); prevVisited = step.node; }

    const logType = step.type === 'rotate'  ? 'rotate'  :
                    step.type === 'insert'  ? 'insert'  :
                    step.type === 'search'  ? 'search'  :
                    step.type === 'balance' ? 'balance' : '';
    Logger.add(step.msg, logType);

    Stats.stepLabel(current, queue.length);
  }

  function stepForward() {
    if (current >= queue.length) { playing = false; updateUI(); return; }
    executeStep(queue[current++]);
    updateUI();
  }

  function stepBack() {
    if (history.length === 0) return;
    const prev = history.pop();
    current--;
    prevVisited = prev.prevVisited;
    // Restaurar al estado anterior: resetear todos y re-ejecutar hasta current
    // (simplificado: limpiar highlights y rebobinar visualmente)
    clearAllHighlights();
    // Re-aplicar los pasos hasta current
    for (let i = 0; i < current; i++) {
      const s = queue[i];
      if (s.node !== null && s.node !== undefined) {
        getOrCreate(s.node);
        if      (s.type === 'insert')  setNodeTarget(s.node, 'inserted');
        else if (s.type === 'rotate')  setNodeTarget(s.node, 'rotate');
      }
    }
    Stats.stepLabel(current, queue.length);
    updateUI();
  }

  function clearAllHighlights() {
    for (const val in nodeStates) resetNodeToNormal(parseInt(val));
    prevVisited = null;
  }

  function play() {
    if (current >= queue.length) { current = 0; clearAllHighlights(); }
    playing = true;
    updateUI();
    Status.set('Reproduciendo…', true);
    function tick() {
      if (!playing || current >= queue.length) {
        playing = false;
        updateUI();
        Status.set('Listo');
        return;
      }
      stepForward();
      timer = setTimeout(tick, delay());
    }
    tick();
  }

  function pause() {
    playing = false;
    clearTimeout(timer);
    updateUI();
    Status.set('Pausado');
  }

  function stop() {
    playing = false;
    clearTimeout(timer);
    current = 0;
    queue   = [];
    history = [];
    clearAllHighlights();
    edgeStates = {};
    updateUI();
    Stats.stepLabel(0, 0);
  }

  function undo() { pause(); stepBack(); }

  function isPlaying() { return playing; }

  function updateUI() {
    const btn = document.getElementById('btn-play');
    btn.textContent = playing ? '⏸' : '▶';
    btn.title = playing ? 'Pausar' : 'Reproducir';
  }

  function getNodeState(val) { return nodeStates[val] || null; }
  function getNodeScale(val) { return nodeScales[val] ? nodeScales[val].s : 1; }

  return { load, play, pause, stop, stepForward, stepBack, undo,
           setSpeed, isPlaying, getNodeState, getNodeScale,
           getEdgeProgress, touchEdge, startRAF, stopRAF,
           clearAllHighlights };
})();
</script>

<script>
'use strict';

/* ─────────────────────────────────────────────────────────────────────
   AVL CANVAS — renderizado con interpolación suave
   Lee los estados de AnimEngine para dibujar colores interpolados.
   Cada nodo tiene:
     - Color interpolado (r,g,b) desde AnimEngine.getNodeState()
     - Escala animada con "punch" al visitarse
   Cada arista:
     - Se dibuja con progreso 0→1 (grow-in animation) via edgeProgress
────────────────────────────────────────────────────────────────────── */
const AVLCanvas = (() => {
  const canvas  = document.getElementById('avl-canvas');
  const ctx     = canvas.getContext('2d');
  const tooltip = document.getElementById('tooltip');

  const NODE_R    = 24;
  const V_GAP     = 76;
  const MIN_H_GAP = 20;

  let offsetX = 0, offsetY = 0, scale = 1;
  let nodePositions = {};
  let dragging = false, dragStartX = 0, dragStartY = 0, dragOX = 0, dragOY = 0;

  function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width  = rect.width;
    canvas.height = rect.height - 32;
    redraw();
  }

  function color(v) { return ThemeManager.getVar(v); }

  /* ── Cálculo de posiciones (inorder traversal) ── */
  function calcPositions(node, depth, positions, counter) {
    if (!node) return;
    calcPositions(node.left,  depth + 1, positions, counter);
    counter.idx++;
    positions[node.val] = {
      x: counter.idx * (NODE_R * 2 + MIN_H_GAP),
      y: depth * V_GAP + NODE_R + 28,
      node
    };
    calcPositions(node.right, depth + 1, positions, counter);
  }

  function buildPositions() {
    nodePositions = {};
    const root = AVLTree.getRoot();
    if (!root) return;
    const counter = { idx: -1 };
    calcPositions(root, 0, nodePositions, counter);
    // Centrar
    const xs = Object.values(nodePositions).map(p => p.x);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const shift = canvas.width / (2 * scale) - (minX + maxX) / 2;
    Object.values(nodePositions).forEach(p => p.x += shift);
  }

  /* ── Dibuja arista con animación de progreso t ∈ [0,1] ── */
  function drawEdge(parentPos, childPos, t) {
    const dx = childPos.x - parentPos.x;
    const dy = childPos.y - parentPos.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const nx = dx / dist, ny = dy / dist;

    const sx = parentPos.x + nx * NODE_R;
    const sy = parentPos.y + ny * NODE_R;
    const ex0 = childPos.x - nx * NODE_R;
    const ey0 = childPos.y - ny * NODE_R;

    // Punto interpolado según t
    const ex = sx + (ex0 - sx) * t;
    const ey = sy + (ey0 - sy) * t;

    // Línea con gradiente suave
    const grad = ctx.createLinearGradient(sx, sy, ex0, ey0);
    grad.addColorStop(0, color('--edge-color') + 'aa');
    grad.addColorStop(1, color('--accent-bright') + '55');

    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.8;
    ctx.globalAlpha = 0.55 + t * 0.35;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Flecha solo si t >= 0.95
    if (t >= 0.95) {
      const angle = Math.atan2(ny, nx);
      const al = 9;
      ctx.beginPath();
      ctx.moveTo(ex0, ey0);
      ctx.lineTo(ex0 - al * Math.cos(angle - 0.38), ey0 - al * Math.sin(angle - 0.38));
      ctx.moveTo(ex0, ey0);
      ctx.lineTo(ex0 - al * Math.cos(angle + 0.38), ey0 - al * Math.sin(angle + 0.38));
      ctx.strokeStyle = color('--accent-bright');
      ctx.lineWidth = 1.4;
      ctx.globalAlpha = 0.75 * t;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  /* ── Dibuja nodo con color interpolado y escala animada ── */
  function drawNode(pos) {
    const nodeVal = pos.node.val;
    const ns      = AnimEngine.getNodeState(nodeVal);
    const sc      = AnimEngine.getNodeScale(nodeVal);
    const bfVal   = AVLTree.getBF(nodeVal);

    let fillR, fillG, fillB, strokeCol, glowAlpha, textCol;

    if (ns) {
      fillR = Math.round(ns.r);
      fillG = Math.round(ns.g);
      fillB = Math.round(ns.b);
      glowAlpha = ns.glowT;
      // Stroke basado en estado
      const state = ns.state;
      if      (state === 'visiting') { strokeCol = color('--highlight');      textCol = '#fff'; }
      else if (state === 'inserted') { strokeCol = '#86efac';                 textCol = '#fff'; }
      else if (state === 'rotate')   { strokeCol = '#fcd34d';                 textCol = '#111'; }
      else if (state === 'balance')  { strokeCol = '#fca5a5';                 textCol = '#fff'; }
      else                           { strokeCol = color('--node-stroke');    textCol = color('--node-text'); }
    } else {
      // Estado por defecto
      const bc = ThemeManager.getVar('--node-fill').trim();
      const parsed = bc.startsWith('#') ? parseInt(bc.slice(1), 16) : 0x6d28d9;
      fillR = (parsed >> 16) & 255;
      fillG = (parsed >> 8)  & 255;
      fillB =  parsed        & 255;
      strokeCol  = color('--node-stroke');
      textCol    = color('--node-text');
      glowAlpha  = 0;
    }

    const r = NODE_R * sc;
    ctx.save();
    ctx.translate(pos.x, pos.y);

    // Glow exterior animado
    if (glowAlpha > 0.05) {
      const glow = ctx.createRadialGradient(0, 0, r * 0.5, 0, 0, r * 2.2);
      glow.addColorStop(0, `rgba(${fillR},${fillG},${fillB},${0.35 * glowAlpha})`);
      glow.addColorStop(1, `rgba(${fillR},${fillG},${fillB},0)`);
      ctx.beginPath();
      ctx.arc(0, 0, r * 2.2, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
    }

    // Sombra difuminada
    ctx.shadowColor  = `rgba(${fillR},${fillG},${fillB},${0.5 + glowAlpha * 0.3})`;
    ctx.shadowBlur   = 6 + glowAlpha * 14;

    // Círculo principal con gradiente radial sutil
    const radGrad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.05, 0, 0, r);
    radGrad.addColorStop(0, `rgba(${Math.min(fillR+40,255)},${Math.min(fillG+40,255)},${Math.min(fillB+40,255)},1)`);
    radGrad.addColorStop(1, `rgb(${fillR},${fillG},${fillB})`);

    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = radGrad;
    ctx.fill();

    ctx.shadowBlur = 0;

    // Borde
    ctx.strokeStyle = strokeCol;
    ctx.lineWidth   = (ns && ns.state !== 'normal') ? 2.5 : 1.5;
    ctx.stroke();

    // Valor del nodo
    ctx.fillStyle    = textCol;
    ctx.font         = `bold ${nodeVal.toString().length > 3 ? 10 : 13}px 'Space Mono', monospace`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(nodeVal.toString(), 0, 0);

    // BF pequeño arriba-derecha
    if (bfVal !== null && bfVal !== undefined) {
      const bfColor = Math.abs(bfVal) === 0 ? '#86efac'
                    : Math.abs(bfVal) === 1 ? color('--warning')
                    : color('--danger');
      ctx.fillStyle    = bfColor;
      ctx.font         = '9px Space Mono, monospace';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(bfVal >= 0 ? '+' + bfVal : bfVal.toString(), r - 5, -r + 7);
    }

    ctx.restore();
  }

  /* ── Recorrido de árbol para dibujar aristas y nodos ── */
  function drawTree(node) {
    if (!node) return;
    const pos = nodePositions[node.val];
    if (!pos) return;

    if (node.left) {
      const lpos = nodePositions[node.left.val];
      if (lpos) {
        const t = AnimEngine.getEdgeProgress(node.val, node.left.val);
        drawEdge(pos, lpos, t);
      }
      drawTree(node.left);
    }
    if (node.right) {
      const rpos = nodePositions[node.right.val];
      if (rpos) {
        const t = AnimEngine.getEdgeProgress(node.val, node.right.val);
        drawEdge(pos, rpos, t);
      }
      drawTree(node.right);
    }
    drawNode(pos);
  }

  /* ── Cuadrícula de fondo ── */
  function drawGrid() {
    const gs = 40 * scale;
    const w = canvas.width, h = canvas.height;
    const ox = ((offsetX % gs) + gs) % gs;
    const oy = ((offsetY % gs) + gs) % gs;
    ctx.strokeStyle = color('--border');
    ctx.lineWidth   = 0.3;
    ctx.globalAlpha = 0.35;
    for (let x = ox; x < w; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
    for (let y = oy; y < h; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }
    ctx.globalAlpha = 1;
  }

  /* ── Canvas vacío ── */
  function drawEmpty() {
    ctx.fillStyle    = color('--text-muted');
    ctx.font         = '14px Rajdhani, sans-serif';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Inserta un valor para construir el árbol', canvas.width / 2, canvas.height / 2 - 16);
    ctx.font         = '11px Space Mono, monospace';
    ctx.fillStyle    = color('--accent-bright');
    ctx.globalAlpha  = 0.45;
    ctx.fillText('AVL Tree Visualizer', canvas.width / 2, canvas.height / 2 + 12);
    ctx.globalAlpha  = 1;
  }

  /* ── REDRAW PRINCIPAL ── */
  function redraw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = color('--canvas-bg');
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawGrid();

    const root = AVLTree.getRoot();
    if (!root) { drawEmpty(); return; }

    buildPositions();
    // Registrar todas las aristas existentes en AnimEngine para grow-in
    (function registerEdges(node) {
      if (!node) return;
      if (node.left)  AnimEngine.touchEdge(node.val, node.left.val);
      if (node.right) AnimEngine.touchEdge(node.val, node.right.val);
      registerEdges(node.left);
      registerEdges(node.right);
    })(root);

    ctx.save();
    ctx.translate(offsetX, offsetY);
    ctx.scale(scale, scale);
    drawTree(root);
    ctx.restore();
  }

  /* ── Centrar vista ── */
  function center() {
    const root = AVLTree.getRoot();
    if (!root) { offsetX = 0; offsetY = 0; scale = 1; redraw(); return; }
    buildPositions();
    const ys = Object.values(nodePositions).map(p => p.y);
    offsetY = 30 - Math.min(...ys) * scale;
    offsetX = 0;
    redraw();
  }

  /* ── Tooltip ── */
  function getNodeAt(mx, my) {
    const tx = (mx - offsetX) / scale, ty = (my - offsetY) / scale;
    for (const [val, pos] of Object.entries(nodePositions)) {
      const dx = tx - pos.x, dy = ty - pos.y;
      if (Math.sqrt(dx * dx + dy * dy) <= NODE_R) return parseInt(val);
    }
    return null;
  }

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    if (dragging) {
      offsetX = dragOX + (e.clientX - dragStartX);
      offsetY = dragOY + (e.clientY - dragStartY);
      redraw();
      return;
    }
    const nv = getNodeAt(mx, my);
    if (nv !== null) {
      const bf = AVLTree.getBF(nv);
      tooltip.textContent = `val: ${nv}  |  BF: ${bf}`;
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top  = (e.clientY - 28) + 'px';
      tooltip.classList.add('visible');
      canvas.style.cursor = 'pointer';
    } else {
      tooltip.classList.remove('visible');
      canvas.style.cursor = dragging ? 'grabbing' : 'crosshair';
    }
  });

  canvas.addEventListener('mousedown', (e) => {
    dragging = true;
    dragStartX = e.clientX; dragStartY = e.clientY;
    dragOX = offsetX; dragOY = offsetY;
    canvas.style.cursor = 'grabbing';
  });
  canvas.addEventListener('mouseup',    () => { dragging = false; canvas.style.cursor = 'crosshair'; });
  canvas.addEventListener('mouseleave', () => { dragging = false; tooltip.classList.remove('visible'); });

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.08 : 0.93;
    const newScale = Math.max(0.3, Math.min(3, scale * factor));
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    offsetX = mx - (mx - offsetX) * (newScale / scale);
    offsetY = my - (my - offsetY) * (newScale / scale);
    scale   = newScale;
    redraw();
  }, { passive: false });

  window.addEventListener('resize', resize);
  resize();

  return { redraw, center, resize };
})();

window.AVLCanvas = AVLCanvas;

/* ── UI CONTROLLER ── */
const UIController = (() => {

  function refreshStats() {
    const n = AVLTree.nodeCount(), h = AVLTree.treeHeight();
    const balanced = n > 0 ? AVLTree.isBalanced() : null;
    Stats.update(n, h);
    Status.setBalance(balanced);
  }

  function runOperation(steps, opName) {
    AnimEngine.load(steps);
    Status.set(`Ejecutando: ${opName}`, true);
    AnimEngine.play();
    refreshStats();
    AVLCanvas.redraw();
  }

  function getVal(id) {
    const v = parseInt(document.getElementById(id).value);
    return isNaN(v) ? null : Math.max(-999, Math.min(999, v));
  }

  document.getElementById('btn-insert').addEventListener('click', () => {
    const val = getVal('insert-val');
    if (val === null) { Logger.add('Ingresa un número válido.'); return; }
    document.getElementById('insert-val').value = '';
    runOperation(AVLTree.insert(val), `INSERTAR ${val}`);
  });

  document.getElementById('insert-val').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('btn-insert').click();
  });

  document.getElementById('btn-insert-random').addEventListener('click', () => {
    const val = Math.floor(Math.random() * 199) - 99;
    document.getElementById('insert-val').value = val;
    runOperation(AVLTree.insert(val), `INSERTAR ${val} (aleatorio)`);
  });

  let seqVals = [10, 20, 30, 40, 50, 25, 15], seqIdx = 0;
  document.getElementById('btn-insert-seq').addEventListener('click', () => {
    if (seqIdx === 0) {
      AVLTree.clear(); Stats.reset();
      AnimEngine.stop(); Logger.clear();
    }
    if (seqIdx >= seqVals.length) { seqIdx = 0; Logger.add('Secuencia reiniciada.'); return; }
    const val = seqVals[seqIdx++];
    runOperation(AVLTree.insert(val), `SECUENCIA: INSERTAR ${val}`);
  });

  document.getElementById('btn-search').addEventListener('click', () => {
    const val = getVal('search-val');
    if (val === null) { Logger.add('Ingresa un número para buscar.'); return; }
    document.getElementById('search-val').value = '';
    runOperation(AVLTree.search(val), `BUSCAR ${val}`);
  });

  document.getElementById('search-val').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('btn-search').click();
  });

  document.getElementById('btn-delete').addEventListener('click', () => {
    const val = getVal('search-val');
    if (val === null) { Logger.add('Ingresa un número para eliminar.'); return; }
    document.getElementById('search-val').value = '';
    runOperation(AVLTree.remove(val), `ELIMINAR ${val}`);
  });

  document.getElementById('btn-play').addEventListener('click', () => {
    if (AnimEngine.isPlaying()) AnimEngine.pause(); else AnimEngine.play();
  });
  document.getElementById('btn-step-fwd').addEventListener('click', () => {
    if (AnimEngine.isPlaying()) AnimEngine.pause();
    AnimEngine.stepForward();
    AVLCanvas.redraw();
  });
  document.getElementById('btn-step-back').addEventListener('click', () => { AnimEngine.stepBack(); });
  document.getElementById('btn-undo').addEventListener('click', () => { AnimEngine.undo(); });
  document.getElementById('btn-stop').addEventListener('click', () => {
    AnimEngine.stop();
    AVLCanvas.redraw();
    Status.set('Animación detenida');
  });

  document.getElementById('speed-slider').addEventListener('input', (e) => {
    const s = parseInt(e.target.value);
    document.getElementById('speed-val').textContent = s;
    AnimEngine.setSpeed(s);
  });

  document.getElementById('btn-clear').addEventListener('click', () => {
    AnimEngine.stop();
    AVLTree.clear();
    Stats.reset();
    Logger.clear();
    Status.set('Árbol limpiado');
    Status.setBalance(null);
    AVLCanvas.redraw();
  });

  document.getElementById('btn-balance-check').addEventListener('click', () => {
    const n = AVLTree.nodeCount();
    if (n === 0) { Logger.add('Árbol vacío.'); return; }
    const ok = AVLTree.isBalanced();
    Logger.add(`Balance global: ${ok ? '✓ ÁRBOL BALANCEADO' : '✗ DESBALANCEADO'}`, ok ? 'insert' : 'rotate');
    Status.setBalance(ok);
  });

  document.getElementById('btn-recenter').addEventListener('click', () => { AVLCanvas.center(); });

  document.getElementById('btn-inorder').addEventListener('click', () => {
    Logger.add(`InOrden: [ ${AVLTree.inorder().join(' → ')} ]`, 'search');
  });
  document.getElementById('btn-preorder').addEventListener('click', () => {
    Logger.add(`PreOrden: [ ${AVLTree.preorder().join(' → ')} ]`, 'search');
  });
  document.getElementById('btn-postorder').addEventListener('click', () => {
    Logger.add(`PostOrden: [ ${AVLTree.postorder().join(' → ')} ]`, 'search');
  });

  function init() {
    ThemeManager.init();
    Status.set('Listo');
    Stats.reset();
    Logger.add('AVL Tree Visualizer iniciado.', 'insert');
    Logger.add('Inserta valores y observa las rotaciones.', '');
    AnimEngine.startRAF();
  }

  return { init };
})();

window.addEventListener('DOMContentLoaded', () => { UIController.init(); });
</script>

</body>
</html>
